
<style>
*{box-sizing:border-box}
body{margin:0}
.wrap{padding:1rem 0;font-family:var(--font-sans)}
.pkg-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 14px;border-radius:var(--border-radius-md);margin-bottom:2px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);user-select:none}
.pkg-header:hover{background:var(--color-background-secondary)}
.pkg-title{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.pkg-meta{font-size:12px;color:var(--color-text-secondary);display:flex;gap:10px;align-items:center}
.pkg-body{display:none;padding:4px 0 12px 0}
.pkg-body.open{display:block}
.prob-row{display:grid;grid-template-columns:28px 1fr 72px 90px;gap:6px;align-items:center;padding:6px 14px;border-radius:6px}
.prob-row:hover{background:var(--color-background-secondary)}
.prob-num{font-size:12px;color:var(--color-text-secondary);text-align:right}
.prob-name{font-size:13px;color:var(--color-text-primary);font-weight:500}
.prob-hint{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.lc-link{font-size:11px;color:var(--color-text-info)}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.e{background:#EAF3DE;color:#3B6D11}
.m{background:#FAEEDA;color:#854F0B}
.h{background:#FAECE7;color:#993C1D}
.c{background:#FCEBEB;color:#A32D2D}
.section-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.06em;text-transform:uppercase;padding:8px 14px 2px;margin-top:6px}
.chevron{transition:transform .2s;font-size:12px;color:var(--color-text-secondary)}
.open-chevron{transform:rotate(90deg)}
.pkg-wrap{margin-bottom:6px}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;font-size:12px;border-radius:20px;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary)}
.filter-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.total-badge{display:inline-block;background:var(--color-background-secondary);border-radius:20px;font-size:11px;padding:2px 8px;color:var(--color-text-secondary);margin-left:6px}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:4px 14px}
</style>

<div class="wrap">
<h2 class="sr-only">All DSA problems sorted easy to hard per package</h2>

<div class="filter-row">
  <span style="font-size:13px;color:var(--color-text-secondary);align-self:center">Filter:</span>
  <button class="filter-btn active" onclick="filterAll(this,'all')">All</button>
  <button class="filter-btn" onclick="filterAll(this,'e')">Easy</button>
  <button class="filter-btn" onclick="filterAll(this,'m')">Medium</button>
  <button class="filter-btn" onclick="filterAll(this,'h')">Hard</button>
  <button class="filter-btn" onclick="filterAll(this,'c')">Critical</button>
  <button class="filter-btn" onclick="expandAll()">Expand all</button>
  <button class="filter-btn" onclick="collapseAll()">Collapse all</button>
</div>

<div id="packages"></div>
</div>

const levelLabel = {e:'Easy',m:'Medium',h:'Hard',c:'Critical'};
const pkgLevel = {e:'Easy',m:'Medium',h:'Hard',c:'Critical'};

let activeFilter = 'all';

function buildUI(){
  const container = document.getElementById('packages');
  container.innerHTML = '';
  data.forEach(pkg => {
    const probs = activeFilter==='all' ? pkg.problems : pkg.problems.filter(p=>p.d===activeFilter);
    if(probs.length===0) return;
    const wrap = document.createElement('div');
    wrap.className='pkg-wrap';
    wrap.dataset.pkgId = pkg.id;

    const header = document.createElement('div');
    header.className='pkg-header';
    header.innerHTML=`<div style="display:flex;align-items:center;gap:10px"><span class="chevron" id="chev-${pkg.id}">▶</span><span class="pkg-title">${pkg.pkg}</span></div><div class="pkg-meta"><span class="badge ${pkg.level}">${pkgLevel[pkg.level]}</span><span>${probs.length} problem${probs.length>1?'s':''}</span></div>`;
    header.onclick = () => togglePkg(pkg.id);

    const body = document.createElement('div');
    body.className='pkg-body';
    body.id='body-'+pkg.id;

    let lastDiff = null;
    probs.forEach((p,i)=>{
      if(p.d !== lastDiff){
        if(lastDiff!==null){const div=document.createElement('div');div.className='divider';body.appendChild(div);}
        const lbl=document.createElement('div');
        lbl.className='section-label';
        lbl.textContent=levelLabel[p.d];
        body.appendChild(lbl);
        lastDiff=p.d;
      }
      const row=document.createElement('div');
      row.className='prob-row';
      const globalNum = pkg.problems.indexOf(p)+1;
      row.innerHTML=`<div class="prob-num">${globalNum}</div><div><div class="prob-name">${p.n.replace(/([A-Z])/g,' $1').trim()}</div><div class="prob-hint">${p.hint}</div></div><div><span class="badge ${p.d}">${levelLabel[p.d]}</span></div><div><span class="lc-link">LeetCode ${p.lc}</span></div>`;
      body.appendChild(row);
    });

    wrap.appendChild(header);
    wrap.appendChild(body);
    container.appendChild(wrap);
  });
}

function togglePkg(id){
  const body=document.getElementById('body-'+id);
  const chev=document.getElementById('chev-'+id);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  chev.classList.toggle('open-chevron',!isOpen);
}

function expandAll(){
  document.querySelectorAll('.pkg-body').forEach(b=>b.classList.add('open'));
  document.querySelectorAll('.chevron').forEach(c=>c.classList.add('open-chevron'));
}

function collapseAll(){
  document.querySelectorAll('.pkg-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.chevron').forEach(c=>c.classList.remove('open-chevron'));
}

function filterAll(btn, level){
  activeFilter=level;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildUI();
}

buildUI();
